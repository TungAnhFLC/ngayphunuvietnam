<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day</title>

<title>Quốc tế phụ nữ!</title>

<style>

#specialBtn{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff6fa5;
color:white;
cursor:pointer;
transition:transform 0.2s, box-shadow 0.2s;
}

#specialBtn:active{
transform:scale(0.9);
}

.specialClick{
animation:specialPulse 0.6s ease;
}

@keyframes specialPulse{

0%{
transform:scale(1);
box-shadow:0 0 0px pink;
}

50%{
transform:scale(1.3);
box-shadow:0 0 20px hotpink;
}

100%{
transform:scale(1);
box-shadow:0 0 0px pink;
}

}
.flyingHeart{
position:fixed;
font-size:20px;
pointer-events:none;
animation:fly 1s ease-out forwards;
}

@keyframes fly{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:translate(var(--x), var(--y)) scale(0.5);
opacity:0;
}
}

#intro{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ffdee9;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

#heart{
font-size:100px;
cursor:pointer;
animation:pulse 1.5s infinite;
transition:transform 0.6s ease;
}

#heart.explode{
animation:explode 0.8s forwards;
}

@keyframes explode{
0%{transform:scale(1);}
50%{transform:scale(3);}
100%{
transform:scale(20);
opacity:0;
}
}

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
color:white;
text-align:center;
}

h1{
font-size:55px;
animation: fadeIn 2s;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:20px;
}

input{
padding:12px;
font-size:18px;
border-radius:15px;
border:none;
margin-top:20px;
}

#searchSection{
margin-top:30px;
display:block;
}


#result{
margin:20px auto;
font-size:24px;
max-width:500px;
letter-spacing:1px;
word-spacing:5px;
line-height:1.6;
text-align:center;

background:rgba(255,255,255,0.2);
padding:20px;
border-radius:20px;

text-shadow:
-1px -1px 0 #000,
1px -1px 0 #000,
-1px 1px 0 #000,
1px 1px 0 #000;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(-40px);}
to{opacity:1; transform:translateY(0);}
}

.heart{
position:fixed;
bottom:-20px;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

</style>

</head>

<body>
<div id="intro">
    <div id="heart">💗</div>
</div>

<div id="mainContent" style="display:none;">

<h1>Chúc mừng ngày quốc tế phụ nữ! 🌸</h1>
<p id="introText">Cho bọn con gái lớp 9A10 thôi</p>

<div id="searchSection">



<input id="nameInput" placeholder="Nhập họ tên mày vào đây"
onkeypress="if(event.key==='Enter'){searchName()}">

<br><br>

<button onclick="searchName()">Search</button>

<div id="result"></div>
<div id="credit"></div>

<button id="specialBtn" onclick="showSpecial()" style="display:none;margin-top:20px;">
Xem tin nhắn đặc biệt

</div>

</div>

function explodeHearts(){

for(let i=0;i<40;i++){

let heart=document.createElement("div");
heart.className="flyingHeart";
heart.innerText="💖";

let x=(Math.random()-0.5)*800+"px";
let y=(Math.random()-0.5)*800+"px";

heart.style.left="50%";
heart.style.top="50%";

heart.style.setProperty("--x",x);
heart.style.setProperty("--y",y);

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000);

}

}

let heart=document.getElementById("heart");

heart.onclick=function(){

heart.classList.add("explode");

explodeHearts();   // 💥 add this line

setTimeout(()=>{

document.getElementById("intro").style.display="none";
document.getElementById("mainContent").style.display="block";

},700)

}
    function normalize(text){
return text
.toLowerCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");
}
function typeWriter(text, element, speed=35){

element.textContent=""

let i=0

function typing(){
if(i < text.length){
element.textContent += text.charAt(i)
i++
setTimeout(typing, speed)
}
}

typing()

}

function start(){
document.getElementById("intro").style.display="none"
document.querySelector("button").style.display="none"
document.getElementById("searchSection").style.display="block"
}

function searchName(){

let input = document.getElementById("nameInput").value.trim();
let result = document.getElementById("result");
let specialBtn = document.getElementById("specialBtn");

let name = null;

for(let key in messages){
if(normalize(key) === normalize(input)){
name = key;
break;
}
}

result.textContent = "Tìm kiếm lời chúc...";
specialBtn.style.display = "none";

setTimeout(() => {

if(name){

typeWriter(messages[name], result);

if(specialMessages[name]){
specialBtn.style.display = "block";
}

}else{
result.textContent = "Nhập sai tên rồi kìa";
}

},1200)

}
function showSpecial(){

let result = document.getElementById("result");
let credit = document.getElementById("credit");

let input = document.getElementById("nameInput").value.trim();

let name = null;

for(let key in specialMessages){
if(normalize(key) === normalize(input)){
name = key;
break;
}
}

if(name){

typeWriter(specialMessages[name].message, result);

credit.innerHTML = "— Người gửi: " + specialMessages[name].author + " ";

}

}



if(name){

let screen = document.createElement("div");
screen.id = "specialScreen";

screen.innerHTML = `
<div id="specialText"></div>
<div id="sender">— From ${name}</div>
`;

document.body.appendChild(screen);

typeWriter(specialMessages[name], document.getElementById("specialText"));

}

600


if(name){
typeWriter(specialMessages[name], result);
}


setInterval(createHeart,400)

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"

heart.innerText="💖"

heart.style.left=Math.random()*100+"vw"

heart.style.fontSize=(Math.random()*18+14)+"px"

heart.style.opacity=Math.random()

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}
